name: Build RDP Manager

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # 递归检出所有子模块

    - name: Clone Zydis and Zycore Submodules
      run: |
        git submodule update --init --recursive
        # 如果 zydis 不是作为官方 submodule 登记，我们强制拉取 zydis 和嵌套的 zycore
        if (-not (Test-Path TermWrap/zydis/CMakeLists.txt)) {
          git clone --recursive https://github.com/zyantific/zydis.git TermWrap/zydis
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Zydis Dependency (Release x64)
      run: |
        cmake -B TermWrap/zydis/build -S TermWrap/zydis -A x64 -DCMAKE_BUILD_TYPE=Release
        cmake --build TermWrap/zydis/build --config Release
        New-Item -ItemType Directory -Force -Path TermWrap\zydis\msvc\bin\ReleaseX64
        Copy-Item TermWrap\zydis\build\Release\Zydis.lib TermWrap\zydis\msvc\bin\ReleaseX64\ -Force

    - name: Build TermWrap DLL (Release x64)
      run: msbuild TermWrap/TermWrap/TermWrap.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Build UmWrap DLL (Release x64)
      run: msbuild TermWrap/UmWrap/UmWrap.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Copy Built DLLs to Resources
      run: |
        New-Item -ItemType Directory -Force -Path Resources
        Copy-Item TermWrap\x64\Release\TermWrap.dll Resources\ -Force
        Copy-Item TermWrap\x64\Release\UmWrap.dll Resources\ -Force
        Copy-Item TermWrap\zydis\build\Release\Zydis.dll Resources\ -Force

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore rdpManager.csproj

    - name: Publish Application (win-x64 Single File)
      run: |
        dotnet publish rdpManager.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:IncludeNativeLibrariesForSelfContained=true `
          -o ./publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rdpManager-win-x64
        path: ./publish/rdpManager.exe
