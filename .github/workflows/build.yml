name: Build RDP Manager

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch: # 支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # 递归检出所有子模块

    - name: Clone Zydis and Zycore Submodules
      run: |
        git submodule update --init --recursive
        # 如果 zydis 不是作为官方 submodule 登记，我们强制拉取 zydis 和嵌套的 zycore
        if (-not (Test-Path TermWrap/zydis/CMakeLists.txt)) {
          git clone --recursive https://github.com/zyantific/zydis.git TermWrap/zydis
        }

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Zydis Dependency (Release x64)
      run: |
        cmake -B TermWrap/zydis/build -S TermWrap/zydis -A x64 -DCMAKE_BUILD_TYPE=Release -DZYDIS_BUILD_SHARED_LIB=ON
        cmake --build TermWrap/zydis/build --config Release
        New-Item -ItemType Directory -Force -Path TermWrap\zydis\msvc\bin\ReleaseX64
        Copy-Item TermWrap\zydis\build\Release\Zydis.lib TermWrap\zydis\msvc\bin\ReleaseX64\ -Force

    - name: Build Zydis Dependency (Release x86)
      run: |
        cmake -B TermWrap/zydis/build_x86 -S TermWrap/zydis -A Win32 -DCMAKE_BUILD_TYPE=Release -DZYDIS_BUILD_SHARED_LIB=ON
        cmake --build TermWrap/zydis/build_x86 --config Release
        New-Item -ItemType Directory -Force -Path TermWrap\zydis\msvc\bin\ReleaseX86
        Copy-Item TermWrap\zydis\build_x86\Release\Zydis.lib TermWrap\zydis\msvc\bin\ReleaseX86\ -Force

    - name: Build TermWrap DLL (Release x64)
      run: msbuild TermWrap/TermWrap/TermWrap.vcxproj /p:Configuration=Release /p:Platform=x64 /p:SolutionDir="${{ github.workspace }}\TermWrap\\"

    - name: Build TermWrap DLL (Release x86)
      run: msbuild TermWrap/TermWrap/TermWrap.vcxproj /p:Configuration=Release /p:Platform=Win32 /p:SolutionDir="${{ github.workspace }}\TermWrap\\"

    - name: Build UmWrap DLL (Release x64)
      run: msbuild TermWrap/UmWrap/UmWrap.vcxproj /p:Configuration=Release /p:Platform=x64 /p:SolutionDir="${{ github.workspace }}\TermWrap\\"

    - name: Copy Built DLLs to Resources
      run: |
        New-Item -ItemType Directory -Force -Path Resources/x64
        New-Item -ItemType Directory -Force -Path Resources/x86
        Copy-Item TermWrap\x64\Release\TermWrap.dll Resources\x64\ -Force
        Copy-Item TermWrap\x64\Release\UmWrap.dll Resources\x64\ -Force
        Copy-Item TermWrap\zydis\build\Release\Zydis.dll Resources\x64\ -Force
        Copy-Item TermWrap\Release\TermWrap.dll Resources\x86\ -Force
        Copy-Item TermWrap\zydis\build_x86\Release\Zydis.dll Resources\x86\ -Force

    - name: Generate MSTSCLib ActiveX Interop Assemblies
      run: |
        # 优先寻找 x64 版本的 aximp.exe
        $aximp = Get-ChildItem -Path "C:\Program Files (x86)\Microsoft SDKs\Windows" -Filter "aximp.exe" -Recurse | Where-Object { $_.FullName -like "*\x64\*" } | Select-Object -First 1 -ExpandProperty FullName
        if (-not $aximp) {
            $aximp = Get-ChildItem -Path "C:\Program Files (x86)\Microsoft SDKs\Windows" -Filter "aximp.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        }
        if (-not $aximp) {
            $aximp = Get-ChildItem -Path "C:\Program Files" -Filter "aximp.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        }
        if (-not $aximp) {
            throw "Could not find aximp.exe in Windows SDK path"
        }
        Write-Host "Found aximp.exe at: $aximp"
        New-Item -ItemType Directory -Force -Path Libs
        Push-Location Libs
        & $aximp C:\Windows\System32\mstscax.dll
        if ($LASTEXITCODE -ne 0) {
            throw "aximp.exe failed with exit code $LASTEXITCODE"
        }
        Write-Host "Contents of Libs directory after aximp:"
        Get-ChildItem -Path .
        Pop-Location

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: msbuild rdpManager.csproj /t:Restore /p:Configuration=Release

    - name: Build Application
      run: |
        msbuild rdpManager.csproj `
          /t:Rebuild `
          /p:Configuration=Release `
          /p:OutputPath=./publish

    - name: Prepare Artifacts & Build Setup Installer
      shell: pwsh
      run: |
        # 1. 确定当前的版本号后缀
        $rawVersion = "${{ github.ref_name }}"
        if ("${{ github.ref_type }}" -eq "tag" -and $rawVersion -like "v*") {
            $version = $rawVersion
        } else {
            $version = "latest"
        }
        Write-Host "Determined version: $version"

        # 2. 复制为无版本后缀的干净文件（供 Inno Setup 打包）
        Copy-Item ./publish/rdpManager.exe ./publish/LocalRDP.exe -Force

        # 3. 复制为带版本后缀的便携单文件版本
        Copy-Item ./publish/rdpManager.exe ./publish/LocalRDP-$version.exe -Force

        # 4. 调用 Inno Setup 编译器生成安装包
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        if (Test-Path $iscc) {
            Write-Host "Running ISCC compilation..."
            & $iscc /DAppVersion=$version installer.iss
            if ($LASTEXITCODE -ne 0) {
                throw "ISCC compilation failed with exit code $LASTEXITCODE"
            }
        } else {
            throw "ISCC compiler not found at $iscc"
        }

        # 5. 删除临时文件以防混淆
        Remove-Item ./publish/LocalRDP.exe -Force

        # 6. 查看输出目录确认
        Write-Host "Publish Folder contents:"
        Get-ChildItem -Path ./publish
        Write-Host "Setup Folder contents:"
        Get-ChildItem -Path ./publish_setup

    - name: Upload Single File Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocalRDP-win-x64-SingleFile
        path: ./publish/LocalRDP-*.exe

    - name: Upload Setup Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocalRDP-win-x64-Setup
        path: ./publish_setup/LocalRDP-*-Setup.exe

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/LocalRDP-*.exe
          ./publish_setup/LocalRDP-*-Setup.exe
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
        name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Rolling Release' }}
        draft: false
        prerelease: ${{ github.ref_type != 'tag' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
